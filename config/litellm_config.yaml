  # META AGENTS — spread across multiple free providers
  # ═══════════════════════════════════════════════════════════════
  - model_name: meta-agent
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      temperature: 0.3
      max_tokens: 1500

  - model_name: meta-agent
