services:
  # ── Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: swarmforge
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarmpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d swarmforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarmforge

  # ── Event Bus ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarmforge

  # ── LLM Proxy ────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml:ro
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    ports:
      - "4000:4000"
    command: --config /app/config.yaml --port 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - swarmforge

  # ── FastAPI Backend ──────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ./output:/workspace/output
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - swarmforge

  # ── Code Execution Sandbox ───────────────────────────────────
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    volumes:
      - ./output:/workspace/output
    security_opt:
      - no-new-privileges:true
    networks:
      - swarmforge
    tty: true
    stdin_open: true

  # ── React Dashboard ──────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - swarmforge

  # ── Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - dashboard
    networks:
      - swarmforge

  # ── Monitoring ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - swarmforge

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - swarmforge

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    networks:
      - swarmforge

volumes:
  postgres_data:
  redis_data:

networks:
  swarmforge:
    driver: bridge
