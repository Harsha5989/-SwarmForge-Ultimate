global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "swarmforge-api"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"

  - job_name: "litellm"
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]
        labels:
          service: "litellm"
